<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depotra - Admin Dashboard</title>
    <link rel="icon" type="image/png" href="favicon/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="top-nav">
      <a href="/" class="logo">
        <img class="logo-img" src="logo.svg" alt="Depotra Logo" />
        <span class="logo-text">Admin Dashboard</span>
      </a>
      <div class="nav-controls">
        <span class="muted" id="adminIdentity">Logged in as <strong id="adminUsername">admin</strong></span>
        <button id="createAdminBtn" class="btn btn-purple" type="button">+ Create Admin</button>
        <button id="logoutBtn" class="btn btn-red" type="button">Logout</button>
      </div>
    </header>

    <main class="container">
      <section class="stats-grid">
        <article class="card stat-card">
          <h3>Total Games</h3>
          <p id="totalGames">0</p>
        </article>
        <article class="card stat-card">
          <h3>Featured Games</h3>
          <p id="featuredGames">0</p>
        </article>
        <article class="card stat-card">
          <h3>Recently Added</h3>
          <p id="recentGames">0</p>
        </article>
        <article class="card stat-card">
          <h3>Missing Images</h3>
          <p id="missingImages">0</p>
        </article>
      </section>

      <section class="dashboard-controls">
        <input id="dashboardSearch" class="input" type="text" placeholder="Search games…" />
        <div class="filter-btns" role="group" aria-label="Filter by status">
          <button class="btn filter-btn active" data-filter="all" type="button">All</button>
          <button class="btn filter-btn" data-filter="featured" type="button">Featured</button>
          <button class="btn filter-btn" data-filter="complete" type="button">Complete</button>
          <button class="btn filter-btn" data-filter="draft" type="button">Draft</button>
        </div>
        <div class="control-actions">
          <button id="exportCsvBtn" class="btn btn-blue" type="button">Export CSV</button>
          <button id="bulkDeleteBtn" class="btn btn-red hidden" type="button">
            Delete Selected (<span id="bulkCount">0</span>)
          </button>
          <button id="addGameBtn" class="btn btn-green" type="button">Add New Game</button>
        </div>
      </section>

      <section class="card table-wrap">
        <table class="game-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="selectAll" title="Select all" /></th>
              <th>Image</th>
              <th><button class="sort-btn" data-sort="title" type="button">Title</button></th>
              <th><button class="sort-btn" data-sort="genre" type="button">Genre</button></th>
              <th><button class="sort-btn" data-sort="featured" type="button">Featured</button></th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="gamesTableBody"></tbody>
        </table>
        <p id="dashboardEmpty" class="empty-state hidden">No games found.</p>
      </section>
    </main>

    <!-- ── Game Editor Modal ── -->
    <div id="gameModal" class="modal side-modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-content card side-panel">
        <div class="modal-header">
          <h2 id="modalTitle">Game Editor</h2>
          <button id="closeModalBtn" class="btn btn-red" type="button">✕</button>
        </div>

        <form id="gameForm" class="form-grid">
          <input id="gameId" name="gameId" type="hidden" />

          <label>
            Steam App ID (optional)
            <div class="inline-row">
              <input id="steamAppId" name="steamAppId" class="input" type="text" placeholder="e.g. 730" />
              <button id="fetchSteamBtn" class="btn btn-blue" type="button">Fetch from Steam</button>
            </div>
          </label>

          <label>Title<input id="title" name="title" class="input" type="text" required /></label>
          <label>Description<textarea id="description" name="description" class="input textarea" required></textarea></label>
          <label>Image URL<input id="imageUrl" name="imageUrl" class="input" type="url" /></label>
          <label>Direct Download Link<input id="downloadLink" name="downloadLink" class="input" type="url" required /></label>
          <label>Genre<input id="genre" name="genre" class="input" type="text" /></label>
          <label>Developer<input id="developer" name="developer" class="input" type="text" /></label>
          <label>Publisher<input id="publisher" name="publisher" class="input" type="text" /></label>
          <label>Release Date<input id="releaseDate" name="releaseDate" class="input" type="text" placeholder="YYYY-MM-DD or Steam date" /></label>
          <label>Tags (comma separated)<input id="tags" name="tags" class="input" type="text" placeholder="action, adventure" /></label>

          <label class="checkbox-row">
            <input id="featured" name="featured" type="checkbox" /> Featured Game
          </label>

          <label>
            Online Fix Available
            <select id="onlineFix" name="onlineFix" class="input">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </label>
          <div id="onlineFixLinkRow" class="hidden">
            <label>Online Fix Download Link<input id="onlineFixLink" name="onlineFixLink" class="input" type="url" placeholder="https://..." /></label>
          </div>

          <label>
            Generic Fix Available
            <select id="genericFix" name="genericFix" class="input">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </label>
          <div id="genericFixLinkRow" class="hidden">
            <label>Generic Fix Download Link<input id="genericFixLink" name="genericFixLink" class="input" type="url" placeholder="https://..." /></label>
          </div>

          <div class="modal-actions">
            <button class="btn btn-green" type="submit">Save Game</button>
            <button id="cancelModalBtn" class="btn btn-blue" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Create Admin Modal ── -->
    <div id="createAdminModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="createAdminTitle">
      <div class="modal-content card" style="width:min(460px,100%)">
        <div class="modal-header">
          <h2 id="createAdminTitle">Create Admin Account</h2>
          <button id="closeAdminModalBtn" class="btn btn-red" type="button">✕</button>
        </div>
        <form id="createAdminForm" class="form-stack">
          <input id="newAdminUsername" class="input" type="text" placeholder="Username" autocomplete="off" required />
          <input id="newAdminPassword" class="input" type="password" placeholder="Password (min 6 characters)" required minlength="6" />
          <input id="newAdminConfirmPassword" class="input" type="password" placeholder="Confirm Password" required />
          <p id="createAdminMessage" class="muted" style="text-align:center;min-height:22px"></p>
          <div class="modal-actions">
            <button class="btn btn-green" type="submit">Create Admin</button>
            <button id="cancelAdminModalBtn" class="btn btn-blue" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Confirm Dialog Modal ── -->
    <div id="confirmModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content card confirm-dialog">
        <p id="confirmMessage" class="confirm-message"></p>
        <div class="modal-actions">
          <button id="confirmOkBtn" class="btn btn-red" type="button">Delete</button>
          <button id="confirmCancelBtn" class="btn btn-blue" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <div id="dashboardLoading" class="loading-overlay hidden">
      <div class="spinner"></div>
    </div>

    <script src="js/storage.js" defer></script>
    <script src="js/admin-dashboard.js" defer></script>
  </body>
</html>
