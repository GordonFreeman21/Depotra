<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depotra - Admin Signup</title>
    <link rel="icon" type="image/png" href="favicon/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card card">
      <div class="auth-logo-wrap">
        <img class="logo-img" src="logo.svg" alt="Depotra Logo" />
      </div>
      <h1>Create Admin Account</h1>

      <div id="accessDenied">
        <p class="warning-text">
          ⛔ Access Denied — Admin accounts can only be created by existing admins from within the
          <strong>Admin Dashboard</strong>.
        </p>
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:20px;text-align:center;">
          <a class="btn btn-green" href="admin-login.html">Login as Admin</a>
          <a class="muted" href="/">Back to Store</a>
        </div>
      </div>
    </main>

    <script src="js/admin-signup.js"></script>
  </body>
</html>
