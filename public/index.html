<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depotra - Store</title>
    <link rel="icon" type="image/png" href="favicon/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="top-nav">
      <a href="/" class="logo logo-only">
        <img class="logo-img" src="logo.svg" alt="Depotra Logo" />
      </a>
      <div class="nav-controls store-filters sticky-filter-bar">
        <input id="searchInput" class="input" type="text" placeholder="Search games..." />
        <select id="genreFilter" class="input select">
          <option value="">All Genres</option>
        </select>
        <a class="btn btn-blue" href="admin-login.html">Admin Login</a>
      </div>
    </header>

    <main class="container">
      <section class="hero" id="featuredCarousel">
        <div class="hero-slide shimmer-box"></div>
      </section>
      <div id="heroDots" class="hero-dots" aria-label="Featured navigation"></div>

      <section class="section-head">
        <h2>Popular Games</h2>
      </section>

      <section id="gamesGrid" class="games-grid"></section>
      <section id="gamesSkeleton" class="games-grid"></section>
      <section id="noGamesState" class="empty-state hidden">No games found.</section>
    </main>

    <footer class="footer">
      <p>© 2026 Depotra</p>
      <div class="footer-links">
        <a href="/">Store</a>
        <a href="admin-login.html">Admin</a>
      </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
