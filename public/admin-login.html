<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depotra - Admin Login</title>
    <link rel="icon" type="image/png" href="favicon/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card card">
      <div class="auth-logo-wrap">
        <img class="logo-img" src="logo.svg" alt="Depotra Logo" />
      </div>
      <h1>Admin Login</h1>
      <form id="loginForm" class="form-stack">
        <input id="username" class="input" type="text" placeholder="Username" required />
        <input id="password" class="input" type="password" placeholder="Password" required />
        <button class="btn btn-green" type="submit">Login</button>
      </form>
      <p id="loginError" class="error-text"></p>
      <p class="muted">Need another admin? <a href="admin-signup.html">Create account</a></p>
      <a class="muted" href="/">Back to Store</a>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/admin-login.js"></script>
  </body>
</html>
