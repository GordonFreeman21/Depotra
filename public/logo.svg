<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 100" width="100%" height="100%">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal icon frame -->
  <polygon points="50,6 82,24 82,60 50,78 18,60 18,24"
    fill="none" stroke="url(#iconGrad)" stroke-width="3"
    filter="url(#glow)" opacity="0.9"/>
  <!-- Inner fill -->
  <polygon points="50,14 74,28 74,56 50,70 26,56 26,28"
    fill="url(#iconGrad)" opacity="0.12"/>

  <!-- D-pad cross inside hex -->
  <rect x="43" y="36" width="14" height="4" rx="2" fill="url(#iconGrad)" filter="url(#softGlow)"/>
  <rect x="48" y="31" width="4" height="14" rx="2" fill="url(#iconGrad)" filter="url(#softGlow)"/>

  <!-- Colored buttons -->
  <circle cx="63" cy="32" r="3" fill="#f472b6" filter="url(#softGlow)"/>
  <circle cx="67" cy="42" r="3" fill="#10b981" filter="url(#softGlow)"/>

  <!-- Joystick dot -->
  <circle cx="35" cy="42" r="4" fill="none" stroke="url(#iconGrad)" stroke-width="2" filter="url(#softGlow)"/>
  <circle cx="35" cy="42" r="2" fill="url(#iconGrad)"/>

  <!-- DEPOTRA wordmark -->
  <text x="100" y="70"
    font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
    font-size="60" font-weight="900"
    fill="url(#textGrad)"
    letter-spacing="6"
    filter="url(#glow)">DEPOTRA</text>

  <!-- Accent line beneath text -->
  <rect x="100" y="78" width="640" height="2.5" rx="2" fill="url(#textGrad)" opacity="0.5"/>
</svg>